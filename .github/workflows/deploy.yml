name: Deploy to Mac Mini

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, mac-mini, prod, xray]
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy
        run: |
          export APP_ENV_FILE="$HOME/envfiles/xray.env"
          test -f "$APP_ENV_FILE" || { echo "Missing production env file: $APP_ENV_FILE" >&2; exit 1; }
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d

      - name: Reload proxy
        run: docker exec nginx_proxy nginx -s reload

      - name: Clean up old images
        run: docker image prune -f
